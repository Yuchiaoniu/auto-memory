<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Kitchen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1e1e1e;--sur:#252526;--bdr:#3e3e42;
  --txt:#d4d4d4;--mut:#888;--active-tab:#1e1e1e;
  --tab-bg:#2d2d2d;--tab-hover:#3e3e42;
  --blu:#0078d4;--grn:#4ec9b0;--ora:#ce9178;--red:#f44747;
  --usr-bg:#1a2733;--usr-bdr:#264f78;
  --bot-bg:#1e1e1e;--bot-bdr:#3e3e42;
}
html,body{height:100%;background:var(--bg);color:var(--txt);
  font-family:'Consolas','Courier New','DFKai-SB',monospace;font-size:15px;overflow:hidden}
body{display:flex;flex-direction:column}

/* ── Tab bar ── */
#tabbar{
  display:flex;align-items:stretch;background:var(--tab-bg);
  border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto;overflow-y:hidden;
  height:35px;min-height:35px;
}
#tabbar::-webkit-scrollbar{height:3px}
#tabbar::-webkit-scrollbar-thumb{background:var(--bdr)}
.tab{
  display:flex;align-items:center;gap:6px;padding:0 14px;cursor:pointer;
  border-right:1px solid var(--bdr);white-space:nowrap;color:var(--mut);
  font-size:.82rem;flex-shrink:0;position:relative;background:var(--tab-bg);
  transition:background .12s,color .12s;user-select:none;min-width:0;max-width:200px;
}
.tab:hover{background:var(--tab-hover);color:var(--txt)}
.tab.active{background:var(--active-tab);color:var(--txt);border-bottom:2px solid var(--blu);}
.tab-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-close{
  font-size:.75rem;opacity:.4;flex-shrink:0;padding:1px 3px;border-radius:3px;
  cursor:pointer;line-height:1;
}
.tab-close:hover{opacity:1;background:rgba(255,255,255,.1)}
.tab-pending{
  background:var(--blu);color:#fff;border-radius:8px;
  padding:0 5px;font-size:.68rem;font-weight:700;flex-shrink:0;
}
#btn-plus{
  display:flex;align-items:center;padding:0 14px;cursor:pointer;color:var(--mut);
  font-size:1.1rem;flex-shrink:0;
}
#btn-plus:hover{color:var(--txt);background:var(--tab-hover)}

/* ── Main area ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ── Project picker overlay ── */
#picker{
  position:absolute;inset:0;background:var(--bg);z-index:50;
  display:flex;flex-direction:column;overflow:hidden;
}
#picker.hidden{display:none}
#picker-hdr{
  padding:16px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;
  display:flex;align-items:center;gap:12px;
}
#picker-title{font-size:1.1rem;font-weight:700;color:var(--grn);flex:1}
#picker-close{
  background:none;border:none;color:var(--mut);cursor:pointer;
  font-size:1.1rem;padding:4px 8px;border-radius:4px;
}
#picker-close:hover{color:var(--txt);background:var(--tab-hover)}
#picker-search{
  background:var(--sur);border:1px solid var(--bdr);color:var(--txt);
  padding:7px 12px;border-radius:6px;font-size:.9rem;font-family:inherit;
  width:280px;
}
#picker-search:focus{outline:none;border-color:var(--blu)}
#picker-grid{
  flex:1;overflow-y:auto;padding:20px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;
}
.pcard{
  background:var(--sur);border:1px solid var(--bdr);border-radius:8px;
  padding:14px 16px;cursor:pointer;transition:border-color .15s,background .15s;
}
.pcard:hover{border-color:var(--blu);background:#1a2733}
.pcard.in-use{opacity:.4;cursor:not-allowed;pointer-events:none}
.pcard-name{font-size:.95rem;font-weight:700;color:var(--grn);margin-bottom:4px}
.pcard-meta{font-size:.78rem;color:var(--mut)}
.pcard-pending{color:var(--ora);font-weight:700}

/* ── Chat panes ── */
.chat-pane{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
}
.chat-pane.hidden{display:none}

.chat-header{
  padding:8px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0;
  display:flex;align-items:center;gap:10px;background:var(--sur);
  font-size:.85rem;
}
.chat-header-name{color:var(--grn);font-weight:700;flex:1}
.chat-header-meta{color:var(--mut);font-size:.78rem}
#btn-stop-global{
  background:none;border:1px solid var(--red);color:var(--red);
  padding:2px 10px;border-radius:4px;cursor:pointer;font-size:.78rem;
  display:none;
}
#btn-stop-global.show{display:block}
#btn-stop-global:hover{background:rgba(244,71,71,.1)}

.msgs{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.msgs::-webkit-scrollbar{width:5px}
.msgs::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

.msg{font-size:.9rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;
     padding:9px 13px;border-radius:6px;max-width:88%}
.msg.user{background:var(--usr-bg);border:1px solid var(--usr-bdr);
          align-self:flex-end;color:#9cdcfe}
.msg.bot{background:var(--bot-bg);border:1px solid var(--bot-bdr);
         align-self:flex-start;color:var(--txt)}
.msg.bot .cursor{display:inline-block;width:8px;height:1em;
                 background:var(--txt);opacity:.7;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:.7}50%{opacity:0}}

.chat-footer{
  padding:10px 16px;border-top:1px solid var(--bdr);background:var(--sur);
  display:flex;align-items:flex-end;gap:10px;flex-shrink:0;
}
textarea#tin{
  flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--txt);
  border-radius:6px;padding:9px 12px;font-size:.9rem;resize:none;
  font-family:inherit;height:44px;min-height:44px;max-height:160px;
  line-height:1.4;
}
textarea#tin:focus{outline:none;border-color:var(--blu)}
#btn-send{
  background:var(--blu);border:none;color:#fff;padding:10px 18px;
  border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:700;
  white-space:nowrap;flex-shrink:0;align-self:flex-end;
}
#btn-send:disabled{opacity:.35;cursor:not-allowed}

/* ── Empty state ── */
#empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;color:var(--mut);
}
#empty.hidden{display:none}
#empty-icon{font-size:3rem;opacity:.3}
#empty-hint{font-size:.95rem}
#btn-open-picker{
  background:var(--blu);border:none;color:#fff;padding:10px 24px;
  border-radius:6px;cursor:pointer;font-size:.95rem;font-weight:700;
}
#btn-open-picker:hover{background:#005fa3}
</style>
</head>
<body>

<!-- Tab bar -->
<div id="tabbar">
  <div id="btn-plus" onclick="openPicker()" title="開啟專案">＋</div>
</div>

<!-- Main area -->
<div id="main">

  <!-- Empty state -->
  <div id="empty">
    <div id="empty-icon">⌨</div>
    <div id="empty-hint">尚未開啟任何專案</div>
    <button id="btn-open-picker" onclick="openPicker()">選擇專案</button>
  </div>

  <!-- Project picker overlay -->
  <div id="picker" class="hidden">
    <div id="picker-hdr">
      <span id="picker-title">▸ 選擇專案</span>
      <input id="picker-search" type="text" placeholder="搜尋專案名稱…" oninput="filterPicker()" autocomplete="off">
      <button id="picker-close" onclick="closePicker()">✕</button>
    </div>
    <div id="picker-grid"></div>
  </div>

  <!-- Chat panes rendered here dynamically -->

</div>

<script>
// ── State ──
let projects = [];        // from /api/projects
let openTabs = [];        // [{name, pending, done, nextTask}]
let activeTab = null;     // project name
let streaming = false;
let activeProc = null;    // EventSource

// ── Init ──
async function init() {
  await loadProjects();
  if (projects.length === 0) return;
  openPicker();
}

async function loadProjects() {
  try {
    const r = await fetch('api/projects');
    projects = await r.json();
  } catch(e) {
    console.error('loadProjects', e);
  }
}

// ── Picker ──
function openPicker() {
  renderPickerGrid('');
  document.getElementById('picker').classList.remove('hidden');
  document.getElementById('picker-search').value = '';
  document.getElementById('picker-search').focus();
}

function closePicker() {
  document.getElementById('picker').classList.add('hidden');
}

function filterPicker() {
  const q = document.getElementById('picker-search').value.toLowerCase();
  renderPickerGrid(q);
}

function renderPickerGrid(q) {
  const grid = document.getElementById('picker-grid');
  const openNames = new Set(openTabs.map(t => t.name));
  const filtered = projects.filter(p => p.name.toLowerCase().includes(q));
  grid.innerHTML = filtered.map(p => {
    const inUse = openNames.has(p.name);
    return `<div class="pcard${inUse?' in-use':''}" onclick="selectProject('${esc(p.name)}')">
      <div class="pcard-name">${esc(p.name)}</div>
      <div class="pcard-meta">
        ${p.pending > 0 ? `<span class="pcard-pending">▸ ${p.pending} 個待辦</span>` : ''}
        ${p.pending === 0 && p.done > 0 ? `<span>✓ ${p.done} 個已完成</span>` : ''}
        ${p.nextTask ? `<br><span style="opacity:.7;font-size:.73rem">${esc(p.nextTask.slice(0,60))}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function selectProject(name) {
  if (openTabs.find(t => t.name === name)) {
    switchTab(name);
    closePicker();
    return;
  }
  const proj = projects.find(p => p.name === name) || {name, pending:0, done:0};
  openTabs.push(proj);
  createChatPane(name);
  renderTabBar();
  switchTab(name);
  closePicker();
}

// ── Tab bar ──
function renderTabBar() {
  const bar = document.getElementById('tabbar');
  // Remove old tabs (keep the + button)
  bar.querySelectorAll('.tab').forEach(t => t.remove());
  const btn = document.getElementById('btn-plus');
  openTabs.forEach(t => {
    const el = document.createElement('div');
    el.className = 'tab' + (t.name === activeTab ? ' active' : '');
    el.dataset.name = t.name;
    el.innerHTML = `
      ${t.pending > 0 ? `<span class="tab-pending">${t.pending}</span>` : ''}
      <span class="tab-name">${esc(t.name)}</span>
      <span class="tab-close" onclick="closeTab(event,'${esc(t.name)}')">✕</span>`;
    el.addEventListener('click', () => switchTab(t.name));
    bar.insertBefore(el, btn);
  });
  document.getElementById('empty').classList.toggle('hidden', openTabs.length > 0);
}

function switchTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.name === name);
  });
  document.querySelectorAll('.chat-pane').forEach(p => {
    p.classList.toggle('hidden', p.dataset.name !== name);
  });
}

function closeTab(e, name) {
  e.stopPropagation();
  fetch('api/reset', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({project: name})}).catch(()=>{});
  openTabs = openTabs.filter(t => t.name !== name);
  const pane = document.querySelector(`.chat-pane[data-name="${name}"]`);
  if (pane) pane.remove();
  if (activeTab === name) {
    activeTab = openTabs.length ? openTabs[openTabs.length-1].name : null;
    if (activeTab) switchTab(activeTab);
  }
  renderTabBar();
}

// ── Chat pane ──
function createChatPane(name) {
  const main = document.getElementById('main');
  const proj = projects.find(p => p.name === name) || {name, pending:0, done:0};
  const pane = document.createElement('div');
  pane.className = 'chat-pane hidden';
  pane.dataset.name = name;
  pane.innerHTML = `
    <div class="chat-header">
      <span class="chat-header-name">▸ ${esc(name)}</span>
      <span class="chat-header-meta" id="meta-${esc(name)}">
        ${proj.pending ? `${proj.pending} 個待辦` : ''}
      </span>
      <button id="stop-${esc(name)}" style="
        background:none;border:1px solid var(--red);color:var(--red);
        padding:2px 10px;border-radius:4px;cursor:pointer;font-size:.78rem;display:none"
        onclick="stopChat('${esc(name)}')">■ 停止</button>
    </div>
    <div class="msgs" id="msgs-${esc(name)}">
      ${proj.state ? renderBotMsg(proj.state) : ''}
    </div>
    <div class="chat-footer">
      <textarea id="tin-${esc(name)}" placeholder="輸入訊息（Shift+Enter 換行，Enter 送出）…"
        onkeydown="handleKey(event,'${esc(name)}')"></textarea>
      <button id="sendbtn-${esc(name)}" onclick="sendMsg('${esc(name)}')">送出</button>
    </div>`;
  main.appendChild(pane);
  autoResize(pane.querySelector('textarea'));
}

function renderBotMsg(text) {
  return `<div class="msg bot">${escHtml(text)}</div>`;
}

function handleKey(e, name) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg(name);
  }
}

function autoResize(ta) {
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 160) + 'px';
  });
}

// ── Send / Stream ──
async function sendMsg(name) {
  const tin = document.getElementById('tin-' + name);
  const msg = tin.value.trim();
  if (!msg || streaming) return;

  tin.value = '';
  tin.style.height = '44px';

  appendMsg(name, 'user', msg);
  const botEl = appendMsg(name, 'bot', '');
  botEl.innerHTML = '<span class="cursor"></span>';

  streaming = true;
  setSendEnabled(name, false);
  showStopBtn(name, true);

  let buf = '';
  try {
    const res = await fetch('api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({project: name, msg})
    });
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      const chunk = dec.decode(value);
      for (const line of chunk.split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6);
        if (raw === '[DONE]') continue;
        try {
          const d = JSON.parse(raw);
          if (d.t) { buf += d.t; botEl.innerHTML = escHtml(buf) + '<span class="cursor"></span>'; }
          if (d.done) { botEl.innerHTML = escHtml(buf); }
        } catch(_) {}
      }
    }
  } catch(e) {
    botEl.innerHTML = `<span style="color:var(--red)">[連線錯誤] ${esc(String(e))}</span>`;
  }

  if (!buf) botEl.remove();
  streaming = false;
  setSendEnabled(name, true);
  showStopBtn(name, false);
  scrollBottom(name);
}

function stopChat(name) {
  fetch('api/stop', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({project: name})}).catch(()=>{});
  streaming = false;
  setSendEnabled(name, true);
  showStopBtn(name, false);
}

function appendMsg(name, role, text) {
  const msgs = document.getElementById('msgs-' + name);
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = escHtml(text);
  msgs.appendChild(el);
  scrollBottom(name);
  return el;
}

function scrollBottom(name) {
  const msgs = document.getElementById('msgs-' + name);
  if (msgs) msgs.scrollTop = msgs.scrollHeight;
}

function setSendEnabled(name, en) {
  const btn = document.getElementById('sendbtn-' + name);
  if (btn) btn.disabled = !en;
}

function showStopBtn(name, show) {
  const btn = document.getElementById('stop-' + name);
  if (btn) btn.style.display = show ? 'block' : 'none';
}

// ── Keyboard shortcut: Escape closes picker ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePicker();
});

// ── Helpers ──
function esc(s) {
  return String(s).replace(/'/g,"&#39;").replace(/"/g,'&quot;');
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
