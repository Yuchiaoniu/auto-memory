<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🍳 Project Kitchen</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FEFCE8;--sur:#FFFFFF;--bdr:#D4C464;
  --txt:#1C1500;--mut:#7A6830;
  --ora:#B45309;--blu:#1D4ED8;--grn:#166534;--red:#B91C1C;
  --hdr:#FFF9C2;
}
html,body{height:100%;background:var(--bg);color:var(--txt);
          font-family:'DFKai-SB','標楷體','BiauKai',serif;font-size:24px}
body{display:flex;flex-direction:column;overflow:hidden}

/* ── App: three-column layout ── */
#app{flex:1;display:flex;overflow:hidden}

/* ── Left column ── */
#col-left{
  width:175px;min-width:28px;max-width:420px;flex-shrink:0;
  border-right:2px solid var(--bdr);background:var(--hdr);
  position:relative;overflow:hidden;display:flex;flex-direction:column;
  transition:width .18s ease;
}
#col-left.collapsed{width:28px;min-width:28px}
.left-inner{display:flex;flex-direction:column;flex:1;overflow:hidden}
#col-left.collapsed .left-inner{visibility:hidden;pointer-events:none}
#col-left.collapsed .resize-handle{display:none}

.btn-cl{
  position:absolute;right:4px;top:7px;
  background:none;border:none;color:var(--mut);cursor:pointer;
  font-size:.78rem;padding:2px 5px;z-index:5;
}
.btn-cl:hover{color:var(--ora)}

.left-hdr{padding:9px 10px;padding-right:30px;border-bottom:1px solid var(--bdr);flex-shrink:0}
.pyr-btn{width:100%;background:var(--bg);border:1px solid var(--bdr);color:var(--mut);
         padding:6px 8px;border-radius:7px;cursor:pointer;font-size:.8rem;
         text-align:left;display:flex;align-items:center;gap:5px}
.pyr-btn:hover{color:var(--ora);border-color:var(--ora);background:#FFF3E0}

.resize-handle{position:absolute;right:0;top:0;bottom:0;width:5px;
               cursor:col-resize;z-index:10;background:transparent}
.resize-handle:hover,.resize-handle.dragging{background:var(--ora);opacity:.4}

.proj-list{flex:1;overflow-y:auto;padding:8px 7px;display:flex;flex-direction:column;gap:4px}
.pitem{background:var(--sur);border:1px solid var(--bdr);border-radius:8px;
       padding:7px 9px;cursor:grab;display:flex;align-items:center;gap:6px;
       user-select:none;transition:border-color .15s,background .15s;font-size:.85rem}
.pitem:hover{border-color:var(--blu);background:#EEF2FF}
.pitem.in-use{opacity:.4;cursor:default;border-style:dashed}
.pname{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--txt)}
.pcnt{background:var(--ora);color:#fff;border-radius:9px;
      padding:1px 6px;font-size:.7rem;font-weight:700;flex-shrink:0}

/* ── Pyramid overlay ── */
.pyr-overlay{position:absolute;inset:0;background:var(--hdr);z-index:20;
             display:flex;flex-direction:column;overflow:hidden;
             transform:translateX(-100%);transition:transform .22s ease}
.pyr-overlay.open{transform:translateX(0)}
.pyr-ohdr{padding:9px 10px;border-bottom:1px solid var(--bdr);
          display:flex;align-items:center;gap:6px;flex-shrink:0}
.pyr-otitle{flex:1;font-size:.88rem;font-weight:800;color:var(--txt)}
.pyr-close{background:none;border:none;color:var(--mut);cursor:pointer;font-size:1.1rem;padding:2px 5px}
.pyr-close:hover{color:var(--red)}
.pyr-body{flex:1;padding:10px 9px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.pl{padding:7px 8px;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:700;
    text-align:center;color:#fff;transition:filter .15s,transform .1s;
    border:2px solid transparent;margin:0 auto;display:flex;
    align-items:center;justify-content:center;flex-wrap:wrap;gap:3px}
.pl:hover{filter:brightness(1.18)}
.pl.on{border-color:#fff!important;filter:brightness(1.12);transform:scaleX(1.03)}
.pln{flex-shrink:0}
.ptag{background:rgba(255,255,255,.9);color:#222;border-radius:8px;
      padding:1px 5px;font-size:.66rem;font-weight:700}
.drow{display:flex;gap:5px;margin-top:8px;flex-shrink:0}
.db{flex:1;background:var(--bg);border:1px solid var(--bdr);color:var(--mut);
    padding:5px;border-radius:6px;cursor:pointer;font-size:.78rem;text-align:center}
.db:hover{color:var(--txt)}
.db.on{border-color:var(--ora);color:var(--ora);background:#FFF3E0}

/* ── Center column ── */
#col-center{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:200px}

/* Stoves (center) */
#stoves{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
        padding:10px;overflow:hidden}
#stoves.single{grid-template-columns:1fr;grid-template-rows:1fr}

.sc{background:var(--sur);border:2px solid var(--bdr);border-radius:12px;
    display:flex;flex-direction:column;overflow:hidden;cursor:pointer;
    transition:border-color .2s,box-shadow .2s}
.sc:not(.empty):hover{border-color:#A38C00;box-shadow:0 2px 8px rgba(180,160,0,.18)}
.sc.empty{border-style:dashed;border-color:#C8BC6A;opacity:.55;
          cursor:default;align-items:center;justify-content:center}
.sc.empty .ei{font-size:2.2rem;opacity:.3}
.sc.empty .es{font-size:.95rem;color:var(--mut);margin-top:7px}
.sc.sel{border-color:var(--ora)!important;box-shadow:0 0 0 3px rgba(180,83,9,.13)!important}
.sc.drag-over{border-color:var(--blu)!important;background:#EEF2FF}

.shdr{padding:9px 12px;border-bottom:1px solid var(--bdr);background:var(--hdr);
      display:flex;align-items:center;gap:7px;flex-shrink:0}
.sico{font-size:1.1rem;line-height:1}
.sname{font-size:.97rem;font-weight:800;flex:1;color:var(--txt)}
.slyr{font-size:.73rem;color:#6B4E00;background:#FDE68A;
      padding:2px 7px;border-radius:10px;white-space:nowrap;font-weight:600}
.srm{background:none;border:none;color:var(--mut);cursor:pointer;
     font-size:.85rem;padding:2px 4px;opacity:.4;flex-shrink:0}
.srm:hover{opacity:1;color:var(--red)}
.smsgs{flex:1;overflow-y:auto;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.sm{font-size:.92rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;
    padding:7px 10px;border-radius:8px;user-select:text}
.sm.user{background:#FEF9C3;border:1px solid #CEAC00;align-self:flex-end;max-width:90%}
.sm.bot{background:#F5F5F5;border:1px solid #DDD;align-self:flex-start;max-width:95%}
.sstop{background:none;border:1px solid var(--red);color:var(--red);
       border-radius:6px;padding:2px 8px;cursor:pointer;font-size:.78rem;
       flex-shrink:0;opacity:.8}
.sstop:hover{opacity:1;background:#FEE2E2}
.empty-hint{color:var(--mut);font-size:.84rem;text-align:center;margin-top:16px;font-style:italic}
.sftr{padding:7px 10px;border-top:1px solid var(--bdr);background:var(--hdr);flex-shrink:0;display:none}
.sftr.show{display:block}
.lbtn{width:100%;background:var(--ora);border:none;color:#fff;padding:7px;
      border-radius:7px;cursor:pointer;font-size:.88rem;font-weight:700}
.lbtn:hover{background:#92400E}

/* Chat bar */
.chatbar{padding:9px 13px;border-top:2px solid var(--bdr);background:var(--hdr);
         display:flex;align-items:center;gap:10px;flex-shrink:0}
.ctarget{font-size:.88rem;color:var(--mut);white-space:nowrap;min-width:70px}
.ctarget.active{color:var(--ora);font-weight:700}
textarea#tin{flex:1;background:var(--sur);border:1px solid var(--bdr);color:var(--txt);
             border-radius:8px;padding:8px 11px;font-size:.93rem;resize:none;
             font-family:inherit;height:50px}
textarea#tin:focus{outline:none;border-color:var(--blu)}
.sbtn{background:var(--blu);border:none;color:#fff;padding:9px 17px;
      border-radius:8px;cursor:pointer;font-size:.93rem;font-weight:700;white-space:nowrap}
.sbtn:disabled{opacity:.35;cursor:not-allowed}

/* ── Right column (other stoves when one is focused) ── */
#col-right{
  width:230px;flex-shrink:0;border-left:2px solid var(--bdr);background:var(--hdr);
  display:flex;flex-direction:column;overflow:hidden;
  transition:width .18s ease;
}
#col-right.col-hidden{width:0;min-width:0;border-left:none}
#col-right.collapsed{width:28px;min-width:28px}
#col-right.collapsed .right-inner{display:none}
#col-right.collapsed .right-title{display:none}

.right-hdr{padding:7px 8px;border-bottom:1px solid var(--bdr);
           display:flex;align-items:center;gap:5px;flex-shrink:0}
.right-title{flex:1;font-size:.8rem;font-weight:700;color:var(--mut);
             white-space:nowrap;overflow:hidden}
.btn-cr{background:none;border:none;color:var(--mut);cursor:pointer;
        font-size:.78rem;padding:2px 5px;flex-shrink:0}
.btn-cr:hover{color:var(--ora)}

.right-inner{flex:1;overflow-y:auto;padding:6px;display:flex;flex-direction:column;gap:6px}
.right-inner .sc{cursor:pointer;min-height:64px}
.right-inner .sname{font-size:.85rem}
.right-inner .sm{font-size:.78rem;padding:4px 7px}
.right-inner .smsgs{max-height:120px}

/* Animations */
@keyframes flk{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.1)}}
.fl{animation:flk 1s ease-in-out infinite;display:inline-block}
@keyframes spn{to{transform:rotate(360deg)}}
.sp{animation:spn 1.1s linear infinite;display:inline-block}
</style>
</head>
<body>

<div id="app">

  <!-- ── Left column: project list ── -->
  <div id="col-left">
    <button class="btn-cl" id="btn-cl" onclick="toggleLeft()">◀</button>
    <div class="left-inner">
      <div class="left-hdr">
        <button class="pyr-btn" onclick="togglePyr()">📐 開發心智模型</button>
      </div>
      <div class="proj-list" id="projlist"></div>
      <div class="resize-handle" id="rh"></div>
      <!-- Pyramid overlay -->
      <div class="pyr-overlay" id="pyroverlay">
        <div class="pyr-ohdr">
          <span class="pyr-otitle">開發心智模型</span>
          <button class="pyr-close" onclick="togglePyr()">✕</button>
        </div>
        <div class="pyr-body">
          <div id="pyr"></div>
          <div class="drow">
            <button class="db" id="dup" onclick="setDir('up')">↑ 歸納</button>
            <button class="db" id="ddn" onclick="setDir('down')">↓ 演繹</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Center column: stoves + chat ── -->
  <div id="col-center">
    <div id="stoves">
      <div class="sc empty" id="s0"><div class="ei">○</div><div class="es">空爐</div></div>
      <div class="sc empty" id="s1"><div class="ei">○</div><div class="es">空爐</div></div>
      <div class="sc empty" id="s2"><div class="ei">○</div><div class="es">空爐</div></div>
    </div>
    <div class="chatbar">
      <span class="ctarget" id="ctgt">選擇爐子</span>
      <textarea id="tin" placeholder="輸入訊息，和 Claude 探討可行路徑..." onkeydown="onK(event)"></textarea>
      <button class="sbtn" id="sb" onclick="send()" disabled>送出</button>
    </div>
  </div>

  <!-- ── Right column: other stoves (visible when one is focused) ── -->
  <div id="col-right" class="col-hidden">
    <div class="right-hdr">
      <span class="right-title">執行中</span>
      <button class="btn-cr" id="btn-cr" onclick="toggleRight()">▶</button>
    </div>
    <div class="right-inner" id="stoves-right"></div>
  </div>

</div>

<script>
const LYR=[
  {n:'原型&產品',c:'#9C1239'},{n:'模組&方法',c:'#B91C1C'},
  {n:'模型',c:'#DC2626'},{n:'系統&平台',c:'#C2410C'},
  {n:'題目',c:'#B45309'},{n:'理論',c:'#15803D'},
  {n:'範疇',c:'#1D4ED8'},{n:'學科邊界',c:'#4338CA'},
];

const A={
  projects:[],
  stoves:[null,null,null],
  layers:['','',''],
  dirs:['','',''],
  status:['empty','empty','empty'],
  hist:[[],[],[]],
  act:['','',''],
  sel:null,
};
let dragging=null;
let pyrOpen=false;

function dropHandler(e){
  e.preventDefault();
  const s=e.target.closest('.sc');
  if(!s||!dragging)return;
  s.classList.remove('drag-over');
  const i=si(s);
  if(!A.stoves[i]){
    A.stoves[i]=dragging;dragging=null;
    const proj=A.projects.find(p=>p.name===A.stoves[i])||{};
    A.hist[i]=[];
    if(proj.logTurns&&proj.logTurns.length>0){
      proj.logTurns.forEach(t=>{
        A.hist[i].push({r:'user',c:t.user});
        A.hist[i].push({r:'bot',c:t.bot});
      });
      A.status[i]='done';
    }else{
      A.status[i]='thinking';
    }
    renderAll();select(i);
  }
}

function addStoveEvents(container){
  container.addEventListener('dragover',e=>{
    const s=e.target.closest('.sc.empty');
    if(s){e.preventDefault();s.classList.add('drag-over');}
  });
  container.addEventListener('dragleave',e=>{
    const s=e.target.closest('.sc');
    if(s)s.classList.remove('drag-over');
  });
  container.addEventListener('drop',dropHandler);
  container.addEventListener('click',e=>{
    if(e.target.closest('.srm')||e.target.closest('.lbtn'))return;
    if(window.getSelection().toString().length>0)return;
    if(e.target.closest('.sstop'))return;
    const s=e.target.closest('.sc');
    if(s&&A.stoves[si(s)])select(si(s));
  });
}

document.addEventListener('DOMContentLoaded',()=>{
  addStoveEvents(document.getElementById('stoves'));
  addStoveEvents(document.getElementById('stoves-right'));
  renderPyr();
  load();
});

function si(el){return parseInt(el.id.replace('s',''));}

async function stopChat(e,i){
  e.stopPropagation();
  const project=A.stoves[i];
  if(!project)return;
  try{
    await fetch('/api/stop',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project})});
  }catch(_){}
  A.status[i]='done';
  const last=A.hist[i][A.hist[i].length-1];
  if(last&&last.r==='bot'&&last.c.endsWith('…'))last.c+=' [已停止]';
  renderStoves();
}

function togglePyr(){
  pyrOpen=!pyrOpen;
  document.getElementById('pyroverlay').className='pyr-overlay'+(pyrOpen?' open':'');
  renderPyr();
}

function toggleLeft(){
  const col=document.getElementById('col-left');
  const btn=document.getElementById('btn-cl');
  col.classList.toggle('collapsed');
  btn.textContent=col.classList.contains('collapsed')?'▶':'◀';
}

function toggleRight(){
  const col=document.getElementById('col-right');
  if(col.classList.contains('col-hidden'))return;
  const btn=document.getElementById('btn-cr');
  col.classList.toggle('collapsed');
  btn.textContent=col.classList.contains('collapsed')?'◀':'▶';
}

function updateLayout(){
  const stovesEl=document.getElementById('stoves');
  const stovesRight=document.getElementById('stoves-right');
  const colRight=document.getElementById('col-right');
  if(A.sel===null){
    [0,1,2].forEach(j=>stovesEl.appendChild(document.getElementById('s'+j)));
    stovesEl.classList.remove('single');
    colRight.classList.add('col-hidden');
    colRight.classList.remove('collapsed');
    document.getElementById('btn-cr').textContent='▶';
  }else{
    [0,1,2].forEach(j=>{
      const el=document.getElementById('s'+j);
      if(j===A.sel)stovesEl.appendChild(el);
      else stovesRight.appendChild(el);
    });
    stovesEl.classList.add('single');
    colRight.classList.remove('col-hidden');
    colRight.classList.remove('collapsed');
    document.getElementById('btn-cr').textContent='▶';
  }
}

async function load(){
  try{const r=await fetch('/api/projects');A.projects=await r.json();renderAll();}
  catch(e){console.error('載入失敗',e);}
}

function select(i){
  A.sel=i;
  updateLayout();
  renderAll();
  const tgt=document.getElementById('ctgt');
  tgt.textContent='▶ '+(A.stoves[i]||'');
  tgt.className='ctarget active';
  document.getElementById('sb').disabled=false;
  document.getElementById('tin').focus();
  renderPyr();
}

function renderAll(){renderStoves();renderProjList();}

function renderProjList(){
  const used=new Set(A.stoves.filter(Boolean));
  document.getElementById('projlist').innerHTML=A.projects.map(p=>{
    const inUse=used.has(p.name);
    return `<div class="pitem${inUse?' in-use':''}" draggable="${!inUse}"
         ondragstart="${inUse?'':` dragging='${esc1(p.name)}'`}"
         title="${esc1(p.nextTask||'')}">
      <span class="pname">${p.name}</span>
      ${p.pending?`<span class="pcnt">${p.pending}</span>`:''}
    </div>`;
  }).join('');
}

function renderStoves(){
  for(let i=0;i<3;i++){
    const el=document.getElementById('s'+i);
    const name=A.stoves[i];
    const isSel=A.sel===i;
    if(!name){
      el.className='sc empty';
      el.innerHTML='<div class="ei">○</div><div class="es">空爐</div>';
      continue;
    }
    const st=A.status[i];
    const thinking=st!=='done'&&st!=='executing';
    const ico=st==='executing'?'<span class="sp">🌀</span>':st==='done'?'✅':'<span class="fl">🔥</span>';
    const lyr=A.layers[i]?`<span class="slyr">📍${A.layers[i]}</span>`:'';
    const stopBtn=thinking&&A.hist[i].length>0
      ?`<button class="sstop" onclick="stopChat(event,${i})">■ 停止</button>`:'';
    const msgs=A.hist[i].map(m=>`<div class="sm ${m.r==='user'?'user':'bot'}">${esc(m.c)}</div>`).join('');
    const hint=A.hist[i].length===0?'<div class="empty-hint">Claude 等待中...</div>':'';
    const action=A.act[i]
      ?`<div class="sftr show"><button class="lbtn" onclick="launch(${i})">🚀 決定！啟動子進程實作</button></div>`
      :'<div class="sftr"></div>';
    el.className='sc'+(isSel?' sel':'');
    el.innerHTML=`
      <div class="shdr">
        <span class="sico">${ico}</span>
        <span class="sname">${name}</span>
        ${lyr}
        ${stopBtn}
        <button class="srm" onclick="rm(event,${i})">✕</button>
      </div>
      <div class="smsgs" id="sm${i}">${msgs||hint}</div>
      ${action}`;
  }
}

function renderPyr(){
  const i=A.sel;
  document.getElementById('pyr').innerHTML=LYR.map((l,li)=>{
    const w=Math.round(58+li*(38/7))+'%';
    const on=(i!==null&&A.layers[i]===l.n)?' on':'';
    const tags=A.stoves
      .map((nm,si)=>({nm,si}))
      .filter(({nm,si})=>nm&&A.layers[si]===l.n)
      .map(({nm})=>`<span class="ptag">${nm.slice(0,5)}</span>`)
      .join('');
    return `<div class="pl${on}" style="background:${l.c};width:${w};opacity:${on?1:.8}"
         onclick="setLayer('${esc1(l.n)}')">
         <span class="pln">${l.n}</span>${tags}</div>`;
  }).join('');
  const dir=i!==null?A.dirs[i]:'';
  document.getElementById('dup').className='db'+(dir==='up'?' on':'');
  document.getElementById('ddn').className='db'+(dir==='down'?' on':'');
}

function setLayer(n){if(A.sel===null)return;A.layers[A.sel]=n;renderPyr();renderStoves();}
function setDir(d){if(A.sel===null)return;A.dirs[A.sel]=A.dirs[A.sel]===d?'':d;renderPyr();}

function rm(e,i){
  e.stopPropagation();
  const proj=A.stoves[i];
  if(proj)fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project:proj})});
  A.stoves[i]=null;A.layers[i]='';A.dirs[i]='';
  A.status[i]='empty';A.hist[i]=[];A.act[i]='';
  if(A.sel===i){
    A.sel=null;
    updateLayout();
    document.getElementById('ctgt').textContent='選擇爐子';
    document.getElementById('ctgt').className='ctarget';
    document.getElementById('sb').disabled=true;
  }
  renderAll();renderPyr();
}

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function esc1(s){return String(s).replace(/'/g,"\\'");}
function onK(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}

async function send(){
  if(A.sel===null)return;
  const txt=document.getElementById('tin').value.trim();
  if(!txt)return;
  document.getElementById('tin').value='';
  const i=A.sel;
  A.hist[i].push({r:'user',c:txt});
  renderStoves();scrollMsgs(i);
  await stream_(i,txt);
}

async function stream_(i,userMsg){
  document.getElementById('sb').disabled=true;
  A.status[i]='thinking';
  A.hist[i].push({r:'bot',c:'...'});
  const mi=A.hist[i].length-1;
  renderStoves();scrollMsgs(i);
  try{
    const resp=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project:A.stoves[i],userMsg}),
    });
    const reader=resp.body.getReader();const dec=new TextDecoder();
    let buf='',full='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n');buf=parts.pop();
      for(const p of parts){
        if(!p.startsWith('data:'))continue;
        const raw=p.slice(5).trim();if(raw==='[DONE]')break;
        try{
          const obj=JSON.parse(raw);
          if(obj.t){full+=obj.t;A.hist[i][mi].c=full;renderStoves();scrollMsgs(i);}
          if(obj.done){A.status[i]='done';}
        }catch{}
      }
    }
    const m=full.match(/\[ACTION\](.+)/);
    if(m){A.act[i]=m[1].trim();renderStoves();}
  }catch(e){A.hist[i][mi].c='❌ 錯誤：'+e.message;renderStoves();}
  document.getElementById('sb').disabled=false;
}

function scrollMsgs(i){const el=document.getElementById('sm'+i);if(el)el.scrollTop=el.scrollHeight;}

async function launch(i){
  const task=A.act[i],proj=A.stoves[i];
  if(!task||!proj)return;
  A.act[i]='';
  A.status[i]='executing';
  A.hist[i].push({r:'bot',c:`🚀 子進程啟動中...\n任務：${task}\n\n`});
  const mi=A.hist[i].length-1;
  renderStoves();scrollMsgs(i);
  try{
    const resp=await fetch('/api/spawn',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({project:proj,task}),
    });
    const reader=resp.body.getReader();const dec=new TextDecoder();
    let buf='',full=A.hist[i][mi].c;
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const parts=buf.split('\n\n');buf=parts.pop();
      for(const p of parts){
        if(!p.startsWith('data:'))continue;
        const raw=p.slice(5).trim();if(raw==='[DONE]')break;
        try{
          const obj=JSON.parse(raw);
          if(obj.t){full+=obj.t+'\n';A.hist[i][mi].c=full;renderStoves();scrollMsgs(i);}
          if(obj.done){A.status[i]='done';}
        }catch{}
      }
    }
    renderStoves();
  }catch(e){
    A.hist[i][mi].c+='❌ 連線失敗：'+e.message;
    A.status[i]='empty';renderStoves();
  }
}

// ── Left column resize ──
(function(){
  const rh=document.getElementById('rh');
  const lc=document.getElementById('col-left');
  let dragging=false,startX=0,startW=0;
  rh.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startW=lc.offsetWidth;
    rh.classList.add('dragging');
    document.body.style.cursor='col-resize';
    document.body.style.userSelect='none';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const w=Math.max(100,Math.min(420,startW+(e.clientX-startX)));
    lc.style.width=w+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;
    rh.classList.remove('dragging');
    document.body.style.cursor='';
    document.body.style.userSelect='';
  });
})();
</script>
