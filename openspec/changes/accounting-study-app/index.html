<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>會計學練習題</title>
<style>
  :root {
    --ch04: #3b82f6;
    --ch05: #10b981;
    --ch06: #f59e0b;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', '微軟正黑體', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 24px 16px 60px;
  }
  header { text-align: center; margin-bottom: 22px; }
  header h1 { font-size: 1.8rem; font-weight: 700; }
  header p  { color: var(--muted); margin-top: 4px; font-size: 0.95rem; }

  /* Tabs */
  .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 18px; }
  .tab-btn {
    padding: 9px 30px; border: 2px solid var(--border); border-radius: 8px;
    background: white; color: var(--muted); font-size: 0.95rem;
    cursor: pointer; font-weight: 600; transition: all .15s;
  }
  .tab-btn:hover { border-color: #94a3b8; color: var(--text); }
  .tab-btn.active { background: var(--text); border-color: var(--text); color: white; }

  /* Chapter filter */
  .filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 28px; }
  .filter-btn {
    padding: 7px 20px; border: 2px solid var(--border); border-radius: 999px;
    background: white; color: var(--muted); font-size: 0.88rem;
    cursor: pointer; font-weight: 500; transition: all .15s;
  }
  .filter-btn:hover { border-color: #94a3b8; color: var(--text); }
  .filter-btn.active[data-ch="all"]  { background: var(--text);  border-color: var(--text);  color: white; }
  .filter-btn.active[data-ch="Ch04"] { background: var(--ch04);  border-color: var(--ch04);  color: white; }
  .filter-btn.active[data-ch="Ch05"] { background: var(--ch05);  border-color: var(--ch05);  color: white; }
  .filter-btn.active[data-ch="Ch06"] { background: var(--ch06);  border-color: var(--ch06);  color: white; }

  /* Card common */
  .problems { max-width: 860px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
  .card {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 26px 28px;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
  }
  .card.hidden { display: none; }
  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .chapter-tag {
    display: inline-block; padding: 3px 11px; border-radius: 999px;
    font-size: 0.77rem; font-weight: 700; letter-spacing: .04em; flex-shrink: 0;
  }
  .tag-ch04 { background: #dbeafe; color: var(--ch04); }
  .tag-ch05 { background: #d1fae5; color: #059669; }
  .tag-ch06 { background: #fef3c7; color: #b45309; }
  .card-title { font-size: 1rem; font-weight: 700; }
  .card-subtitle { font-size: 0.84rem; color: var(--muted); margin-bottom: 12px; font-style: italic; }

  /* Practice problem */
  .problem-desc {
    background: #f1f5f9; border-left: 4px solid #cbd5e1;
    border-radius: 0 6px 6px 0; padding: 11px 15px;
    font-size: 0.92rem; color: #334155; margin-bottom: 14px;
  }
  .problem-body { font-size: 0.94rem; margin-bottom: 16px; }
  .sub-items { list-style: none; padding-left: 10px; margin-top: 5px; }
  .sub-items li { padding: 3px 0; display: flex; gap: 8px; }
  .sub-items li .num { flex-shrink: 0; font-weight: 600; color: var(--muted); min-width: 26px; }
  .transaction-table { width: 100%; border-collapse: collapse; font-size: 0.89rem; margin-bottom: 6px; }
  .transaction-table th { background: #f1f5f9; padding: 7px 10px; text-align: left; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); }
  .transaction-table td { padding: 7px 10px; border-bottom: 1px solid #f8fafc; vertical-align: top; }
  .transaction-table tr:last-child td { border-bottom: none; }
  .date-cell { white-space: nowrap; font-weight: 600; color: var(--ch05); }
  .ask-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
  .answer-area {
    width: 100%; min-height: 120px; border: 1.5px solid var(--border);
    border-radius: 6px; padding: 11px; font-family: inherit; font-size: 0.91rem;
    color: var(--text); resize: vertical; background: #fafafa; transition: border-color .15s;
  }
  .answer-area:focus { outline: none; border-color: #94a3b8; background: white; }
  .answer-area::placeholder { color: #cbd5e1; }

  /* MC */
  .mc-question { font-size: 0.96rem; margin-bottom: 14px; line-height: 1.65; }
  .mc-options { list-style: none; display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
  .mc-options li {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 13px; border: 1.5px solid var(--border);
    border-radius: 7px; font-size: 0.92rem; transition: border-color .12s, background .12s;
  }
  .mc-options li:hover { border-color: #94a3b8; background: #f8fafc; }
  .mc-opt-label { flex-shrink: 0; font-weight: 700; width: 20px; color: var(--muted); }
  .mc-data-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-bottom: 14px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .mc-data-table th { background: #f1f5f9; padding: 8px 14px; text-align: left; font-weight: 600; color: var(--muted); font-size: 0.85rem; }
  .mc-data-table td { padding: 8px 14px; border-top: 1px solid var(--border); }
  .mc-data-table td:last-child { text-align: right; font-weight: 600; }
  .mc-data-table .is-q { color: #ef4444; font-weight: 700; }
  .my-answer-row { display: flex; align-items: center; gap: 10px; }
  .my-answer-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
  .my-answer-input {
    width: 58px; padding: 5px 10px; border: 1.5px solid var(--border);
    border-radius: 6px; font-size: 1rem; font-weight: 700; text-align: center;
    color: var(--ch04); font-family: inherit; text-transform: uppercase; transition: border-color .15s;
  }
  .my-answer-input:focus { outline: none; border-color: var(--ch04); }
</style>
</head>

function renderSubItems(items) {
  return `<ul class="sub-items">${items.map((it,i)=>
    `<li><span class="num">(${i+1})</span><span>${it}</span></li>`

}

  return `<table class="transaction-table">

    <tbody>${tx.map(t=>`<tr><td class="date-cell">${t.date}</td><td>${t.content}</td></tr>`).join("")}</tbody>
  </table>`;
}

    <thead><tr><th>項目</th><th>金額</th></tr></thead>
    <tbody>${rows.map(r=>
      `<tr><td>${r.label}</td><td class="${r.isQ?'is-q':''}">${r.value}</td></tr>`
    ).join("")}</tbody>
  </table>`;
}
function renderOptions(opts) {
  return `<ul class="mc-options">${opts.map((o,i)=>
    `<li><span class="mc-opt-label">${LABELS[i]}</span><span>${o}</span></li>`
  ).join("")}</ul>`;
}

/* ─── Render practice ─── */
function renderPractice() {
  document.getElementById("practice-section").innerHTML = PROBLEMS.map(p => {
    let body = p.bodyType==="list" ? renderSubItems(p.items) : renderTransactions(p.transactions);
    return `<div class="card" data-chapter="${p.chapter}">
      <div class="card-header">
        <span class="chapter-tag ${tagClass[p.chapter]}">${p.chapter}</span>
        <span class="card-title">題 ${p.no}｜${p.title}</span>
      </div>
      <div class="card-subtitle">${p.subtitle}</div>
      <div class="problem-desc">${p.desc}</div>
      <div class="problem-body">${body}</div>
      <div class="ask-label">作答區</div>
      <textarea class="answer-area" placeholder="在此輸入分錄或解題過程…"></textarea>
    </div>`;
  }).join("");
}

/* ─── Render MC ─── */
function renderMC() {
  document.getElementById("mc-section").innerHTML = MC.map(p => {
    const tableHtml = p.table ? renderMCTable(p.table) : "";
    return `<div class="card" data-chapter="${p.chapter}">
      <div class="card-header">
        <span class="chapter-tag ${tagClass[p.chapter]}">${p.chapter}</span>
        <span class="card-title">${p.no}</span>
      </div>
      <div class="mc-question">${p.q}</div>
      ${tableHtml}
      ${renderOptions(p.opts)}
      <div class="my-answer-row">
        <span class="my-answer-label">我的答案</span>
        <input class="my-answer-input" maxlength="1" placeholder="A">
      </div>
    </div>`;
  }).join("");
}

/* ─── Tab & filter logic ─── */
let currentTab = "practice";
let currentCh  = "all";

function applyFilter() {
  const id = currentTab === "practice" ? "practice-section" : "mc-section";
  document.querySelectorAll(`#${id} .card`).forEach(card => {
    card.classList.toggle("hidden", currentCh !== "all" && card.dataset.chapter !== currentCh);
  });
}

document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentTab = btn.dataset.tab;
  document.getElementById("practice-section").style.display = currentTab === "practice" ? "" : "none";
  document.getElementById("mc-section").style.display       = currentTab === "mc"       ? "" : "none";
  applyFilter();
}));

document.querySelectorAll(".filter-btn").forEach(btn => btn.addEventListener("click", () => {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentCh = btn.dataset.ch;
  applyFilter();
}));

renderPractice();
renderMC();
</script>
</body>
</html>
